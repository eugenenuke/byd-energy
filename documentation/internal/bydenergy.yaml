          description: >
            Product series codename (named after traditional Chinese solar terms).
            Known options: `lixia` (Inverter/PCS systems like SH5K), `chunfen` (Battery Box / Tower systems), `jingzhe`.
          schema:
            type: string
            enum: [lixia, chunfen, jingzhe]
            example: "lixia"
        - name: pid
          in: query
