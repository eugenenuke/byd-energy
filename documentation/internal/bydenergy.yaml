            type: string
            enum: [bms, pcs, f527]
            example: "bms"
        - name: pid
          in: query
          required: true
          schema:
            type: string
            example: "0SSBJD5002K6BBFBS1000000"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Current OTA version string retrieved."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpgradeVersionResponse'

  /Upgrade/GetReadyUpgradeAppArea:
    get:
      tags:
        - OTA Firmware & Maintenance
      summary: Get inactive firmware bank identifier ready for OTA flashing
      parameters:
        - name: DeviceType
          in: query
          required: true
          schema:
            type: string
            enum: [bms, pcs, f527]
            example: "bms"
        - name: pid
          in: query
          required: true
          schema:
            type: string
            example: "0SSBJD5002K6BBFBS1000000"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Ready upgrade bank identifier retrieved (e.g. 'B')."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpgradeBankResponse'

  /Upgrade/app/GetLatestVersion:
    get:
      tags:
        - OTA Firmware & Maintenance
      summary: Check BYD cloud repository for latest available firmware
      parameters:
        - name: ProductType
          in: query
          required: true
          schema:
            type: string
            enum: [lixia, chunfen, jingzhe]
            example: "lixia"
        - name: deviceType
          in: query
          required: true
          schema:
            type: string
            enum: [bms, pcs, f527]
            example: "bms"
        - name: appType
          in: query
          required: false
          schema:
            type: string
            example: "1"
        - name: bmsType
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "2", "3", "4", "5", "6"]
            example: "4"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Latest version string retrieved (or empty string if up to date)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpgradeVersionResponse'


  /Upgrade/GetAllLatestVersionByPidAndType:
    post:
      tags:
        - OTA Firmware & Maintenance
      summary: Get latest available versions and sizes for all hardware components
      description: >
        Fetches a unified list of latest available firmware version strings and file sizes (in bytes)
        for all subsystems (ARM, DSP1, DSP2, BMS, MCU1, MCU2) in a single POST query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productType:
                  type: string
                  example: "lixia"
                pcsModel:
                  type: string
                  example: "Power-Box SH5K"
                bmsType:
                  type: string
                  example: "4"
                appArea:
                  type: string
                  example: ""
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Successfully retrieved the latest version list."
          content:
            application/json:
              schema:
                type: object
                properties:
                  Success:
                    type: boolean
                  Message:
                    type: string
                  Code:
                    type: integer
                  Data:
                    type: object
                    properties:
                      DeviceVersionList:
                        type: array
                        items:
                          type: object
                          properties:
                            DeviceType:
                              type: string
                              example: "arm"
                            LatestVersion:
                              type: string
                              example: "V328"
                            FileSize:
                              type: number
                              example: 336104

  /Upgrade/remoteUpgrade:
    post:
      tags:
        - OTA Firmware & Maintenance
      summary: Trigger an Over-The-Air (OTA) firmware flash on a subsystem
      description: "Initiates an OTA firmware update for the target subsystem (BMS, PCS, or WiFi stick) using the specified version string."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoteUpgradeRequest'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OTA flash initiated successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoteUpgradeResponse'

  /battery/GetParaSOC:
