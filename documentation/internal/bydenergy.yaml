openapi: 3.0.4
info:
  title: BYD Energy Cloud Reverse-Engineered API Specification
  description: >
    Complete OpenAPI specification for managing BYD Energy household systems (PV, Inverter/PCS, Battery/BMS, and Smart Meters).
    This specification documents authentication workflows (AES-256 password encryption, JWT exchange, and token refresh), 
    device status lookups, real-time telemetry streams across multiple hardware display types, and secure parameter control.
  version: 1.1.0

servers:
  - url: https://energyhousehold.bydessys.com
    description: BYD Production Cloud Server

tags:
  - name: Authentication & Account
    description: Initial cryptographic handshake, secure password login, and JWT session management.
  - name: Station & Installation Settings
    description: High-level address, nation, grid standards (EN50549), and MPPT max power ratings.
  - name: Real-Time Diagnostics
    description: Granular live sensor matrices across hardware display types and instantaneous State of Charge.
  - name: Historical Analytics & Power Curves
    description: Time-series active power curves and accumulated energy totals (daily, monthly, yearly, lifetime).
  - name: System Alarms & Faults
    description: Paginated hardware fault and alarm logs categorized by severity and subsystem.
  - name: OTA Firmware & Maintenance
    description: Hardware series lookups (BMS/PCS types), OTA version comparisons, and remote upgrade triggers.
  - name: Hardware Register Control
    description: EEPROM register inspection and direct remote parameter modifications.

paths:
  /app/GetSecurityKey:
    post:
      tags:
        - Authentication & Account
      summary: Retrieve session-specific cryptographic material
      description: >
        Initiates the login flow by providing a unique security key UUID and raw AES encryption key. 
        The `key` hex string must be truncated to 32 characters and used as the AES-256-CBC key with a hardcoded IV (`"secret&aes&2024&"`) to encrypt the user's password.
      responses:
        "200":
          description: "Successfully generated security key material."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityKeyResponse'

  /api/app/account/app-login:
    post:
      tags:
        - Authentication & Account
      summary: Authenticate user credentials and exchange for JWT tokens
      description: >
        Submits the user's username/email, the security key UUID (`KeyId`), and the AES-256 encrypted password.
        Returns both an AccessToken (valid for 2 hours) and a RefreshToken (valid for 24 hours), and sets an identity cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: "Successful login."
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "ASP.NET Core Identity session cookie (.AspNetCore.Identity.Application)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /api/app/account/refresh-token:
    post:
      tags:
        - Authentication & Account
      summary: Refresh an expired AccessToken
      description: "Exchanges the expired access token and active refresh token for a fresh token pair."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: "Successfully refreshed session tokens."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'

  /UserProduct/ByUserName:
    get:
      tags:
        - Station & Installation Settings
      summary: Retrieve list of products associated with a user account
      parameters:
        - name: UserName
          in: query
          required: true
          schema:
            type: string
            example: "user@example.com"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "User product list retrieved successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProductResponse'

  /Product/app/getPagedPidByType:
    post:
      tags:
        - Station & Installation Settings
      summary: Get paginated list of registered devices and their hardware metadata
      description: "Primary discovery endpoint after login. Discovers all registered PIDs, their product series (lixia, chunfen), hardware models, and BMS versions."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PagedPidRequest'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Registered device list retrieved successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPidResponse'

  /Product/GetProductOnlineState:
    get:
      tags:
        - Real-Time Diagnostics
      summary: Check cloud connectivity status of a device
      parameters:
        - name: pid
          in: query
          required: true
          description: "Unique Product ID (PID / Serial Number) of the inverter or battery system."
          schema:
            type: string
            example: "0SSBJD5002K6BBFBS1000000"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Connectivity status retrieved."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnlineStateResponse'

  /Upgrade/GetBmsType:
    get:
      tags:
        - OTA Firmware & Maintenance
      summary: Get Battery Management System hardware platform code
      description: >
        Returns an integer code indicating the hardware series of the connected battery. 
        Decoded mappings (verified from `helperFn-CdRfY6F9.js`):
        * `1` = Battery Box-LV5.0
        * `2` = Battery-Box HVB
        * `3` = Battery-Box LV5.0+
        * `4` = Battery-Box HVE (High Voltage Storage Series)
        * `5` = Battery-Box HVS+
        * `6` = Battery-Box HVM+
      parameters:
        - name: pid
          in: query
          required: true
          schema:
            type: string
            example: "0SSBJD5002K6BBFBS1000000"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "BMS hardware type retrieved."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BmsTypeResponse'

  /Upgrade/GetPcsType:
    get:
      tags:
        - OTA Firmware & Maintenance
      summary: Get Power Conversion System (Inverter) hardware specification code
      parameters:
        - name: pid
          in: query
          required: true
          schema:
            type: string
            example: "0SSBJD5002K6BBFBS1000000"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "PCS hardware type retrieved."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcsTypeResponse'

  /Upgrade/GetCurrentUpgradeAreaVersion:
    get:
      tags:
