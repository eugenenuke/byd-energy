      summary: Retrieve real-time diagnostic sensor matrix for a subsystem
      description: >
        The primary polling endpoint for live metrics. The returned sensor list varies depending on `realtimeDisplayType`:
        * `sys`: High-level system active power flow (`pvPow`, `lPow`, `battPow`, `me1Pow`) and accumulated energy.
        * `pcs`: Inverter electrical parameters (grid voltages/currents, EPS voltages/currents, internal firmware versions).
        * `batterySystem`: Overall battery pack summary (system voltage, remaining capacity Ah, allowable charge/discharge limits, SOH).
        * `bms`: Granular cell-level BMS details (requires `childNo` parameter for specific battery packs).
        * `eleme`: Attached smart meter readings (active power, power factor, Chint DDSU666 meter info).
      parameters:
        - name: productType
          in: query
          required: true
          schema:
            type: string
            enum: [lixia, chunfen, jingzhe]
            example: "lixia"
        - name: pid
          in: query
          required: true
          schema:
            type: string
            example: "0SSBJD5002K6BBFBS1000000"
        - name: clientType
          in: query
          required: true
          schema:
            type: string
            enum: [app, web]
            example: "app"
        - name: realtimeDisplayType
          in: query
          required: true
          schema:
            type: string
            enum: [sys, pcs, batterySystem, bms, eleme]
            example: "sys"
        - name: no
          in: query
          required: true
          schema:
            type: string
            example: "1"
        - name: childNo
          in: query
          required: false
          description: "Target battery module index (required when realtimeDisplayType is bms)."
          schema:
            type: string
            example: "1"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Real-time sensor list retrieved."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeDataListResponse'

  /Upgrade/UpdateDeviceSetDirect:
    post:
      tags:
        - Hardware Register Control
      summary: Directly modify internal hardware configuration registers
      description: >
        Dispatches command options to update EEPROM registers on the BYD Inverter (PCS) or Battery BMS. 
        Supported configuration keys:
        * `onGSoc`: On-grid reserve State of Charge limit (0–100%).
        * `offGSoc`: Off-grid emergency reserve State of Charge limit (0–100%).
        * `allgrc`: Allow grid charging toggle (`1` = enabled, `0` = disabled).
        * `batEna` / `batEn1`, `batEn2`, `batEn3`: Enable battery charging time window flags.
        * `batTime1`, `batTime2`, `batTime3`: Time window strings (e.g., `"01:00-06:00"`).
        * `cPct1`, `cPct2`, `cPct3`: Charging power percentage (0–100%).
        * `gridEn1`, `gridEn2`, `gridEn3`: Enable grid discharging time window flags.
        * `gridTime1`, `gridTime2`, `gridTime3`: Discharging time window strings.
        * `dcPct1`, `dcPct2`, `dcPct3`: Discharging power percentage (0–100%).
        * `afciEn`: Arc-Fault Circuit Interrupter toggle (`1` or `0`).
        * `drmEn`: Demand Response Mode toggle (`1` or `0`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceSetRequest'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Configuration successfully updated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateDeviceSetResponse'

